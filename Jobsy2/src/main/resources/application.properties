spring.config.import=optional:file:${user.dir}/Jobsy2/env/env.properties

#Database Configuration
spring.datasource.url=${POSTGRE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#Server
server.servlet.context-path=/api

#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#JWT
jwt.secret.key=${JWT_SECRET_KEY}

#Email
brevo.api.key=${BREVO_API_KEY}
spring.mail.properties.mail.smtp.from=${SMTP_MAIL}

#URLS
jobsy2.frontend.url={JOBSY2_FRONTEND_URL}
app.activation.url=${JOBSY2_BACKEND_URL}